name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci
      - name: Generate Prisma client
        working-directory: ./backend
        run: npx prisma generate
      - name: Push schema to test DB
        working-directory: ./backend
        run: npx prisma db push
        env:
          DATABASE_URL: "file:./prisma/test.db"
      - name: Seed test data
        working-directory: ./backend
        run: node seed.js
        env:
          DATABASE_URL: "file:./prisma/test.db"
      - name: Start backend and test health
        working-directory: ./backend
        run: |
          node server.js &
          sleep 3
          curl -f http://localhost:9000/health
          curl -f http://localhost:9000/store/products
          curl -f http://localhost:9000/store/collections
        env:
          DATABASE_URL: "file:./prisma/test.db"
          PORT: 9000
          JWT_SECRET: test-secret

  storefront-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: storefront2/package-lock.json
      - name: Install storefront dependencies
        working-directory: ./storefront2
        run: npm ci
      - name: TypeScript check
        working-directory: ./storefront2
        run: npx tsc --noEmit
      - name: Lint
        working-directory: ./storefront2
        run: npm run lint -- --max-warnings 20
      - name: Unit tests
        working-directory: ./storefront2
        run: npm test
      - name: Build
        working-directory: ./storefront2
        run: npm run build
        env:
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://localhost:9000

  e2e:
    runs-on: ubuntu-latest
    needs: [storefront-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: storefront2/package-lock.json
      - name: Install dependencies
        working-directory: ./storefront2
        run: npm ci
      - name: Install Playwright browsers
        working-directory: ./storefront2
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: ./storefront2
        run: npm run test:e2e
        env:
          CI: "true"
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: storefront2/playwright-report/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, storefront-test]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: docker build -t ua-backend ./backend
      - name: Build storefront Docker image
        run: docker build -t ua-storefront ./storefront2
