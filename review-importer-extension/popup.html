<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 420px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #333; }
    .header { background: #1e2d7d; color: #fff; padding: 16px; text-align: center; }
    .header h1 { font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
    .header p { font-size: 11px; opacity: 0.7; margin-top: 4px; }
    .body { padding: 14px; }

    .status { padding: 10px 14px; border-radius: 6px; margin-bottom: 10px; font-size: 12px; }
    .status--info { background: #e7f3ff; color: #1e5f9a; }
    .status--success { background: #d4edda; color: #155724; }
    .status--error { background: #f8d7da; color: #721c24; }
    .status--warning { background: #fff3cd; color: #856404; }

    .config { margin-bottom: 12px; }
    .config label { display: block; font-size: 11px; font-weight: 600; margin-bottom: 3px; color: #555; }
    .config input, .config select { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 12px; }
    .config .row { display: flex; gap: 8px; margin-bottom: 6px; }
    .config .row > div { flex: 1; }

    .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn--primary { background: #1e2d7d; color: #fff; }
    .btn--success { background: #28a745; color: #fff; margin-top: 8px; }

    .progress-bar { height: 6px; background: #e9ecef; border-radius: 3px; margin: 8px 0; overflow: hidden; }
    .progress-bar__fill { height: 100%; background: #28a745; border-radius: 3px; transition: width 0.3s; }

    .stats { display: flex; gap: 8px; margin: 10px 0; text-align: center; }
    .stat { flex: 1; background: #fff; padding: 8px; border-radius: 6px; border: 1px solid #eee; }
    .stat-value { font-size: 18px; font-weight: 700; color: #1e2d7d; }
    .stat-label { font-size: 10px; color: #888; }

    .preview { margin-top: 8px; max-height: 250px; overflow-y: auto; }
    .preview-card { padding: 8px 10px; background: #fff; border: 1px solid #eee; border-radius: 5px; margin-bottom: 5px; font-size: 11px; }
    .preview-card .stars { color: #ffbd00; font-size: 13px; }
    .preview-card .meta { color: #999; font-size: 10px; margin-top: 2px; }
    .preview-card .text { color: #555; margin-top: 3px; line-height: 1.4; }
    .preview-card .imgs { display: flex; gap: 3px; margin-top: 5px; flex-wrap: wrap; }
    .preview-card .imgs img { width: 44px; height: 44px; object-fit: cover; border-radius: 3px; border: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="header">
    <h1>UA Review Importer</h1>
    <p>Importe avaliações com fotos em massa — Shopee e Mercado Livre</p>
  </div>

  <div class="body">
    <div id="statusBox" class="status status--info">
      Abra um produto na Shopee ou Mercado Livre, role até as avaliações e clique em Extrair.
    </div>

    <div class="config">
      <div class="row">
        <div>
          <label>Servidor</label>
          <input id="serverUrl" type="text" value="http://localhost:9500">
        </div>
        <div>
          <label>Produto destino (ID)</label>
          <input id="targetProduct" type="text" placeholder="vazio = primeiro">
        </div>
      </div>
      <div class="row">
        <div>
          <label>Fotos</label>
          <select id="imageMode">
            <option value="download">Baixar para o servidor</option>
            <option value="link">Manter links originais</option>
            <option value="none">Ignorar fotos</option>
          </select>
        </div>
        <div>
          <label>Estrelas mínimas</label>
          <select id="minRating">
            <option value="1">Todas (1-5)</option>
            <option value="3">3+ estrelas</option>
            <option value="4" selected>4+ estrelas</option>
            <option value="5">Apenas 5</option>
          </select>
        </div>
      </div>
    </div>

    <button id="scrapeBtn" class="btn btn--primary">Extrair Todas as Avaliações</button>

    <div id="progressContainer" style="display:none;">
      <div class="progress-bar"><div class="progress-bar__fill" id="progressFill" style="width:0%"></div></div>
      <p id="progressText" style="font-size:11px;color:#888;text-align:center;"></p>
    </div>

    <div id="statsContainer" style="display:none;">
      <div class="stats">
        <div class="stat"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Reviews</div></div>
        <div class="stat"><div class="stat-value" id="statWithPhotos">0</div><div class="stat-label">Com fotos</div></div>
        <div class="stat"><div class="stat-value" id="statPhotos">0</div><div class="stat-label">Total fotos</div></div>
        <div class="stat"><div class="stat-value" id="statRating">-</div><div class="stat-label">Média</div></div>
      </div>
      <button id="importBtn" class="btn btn--success">Importar em Massa para a Loja</button>
    </div>

    <div id="preview" class="preview"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
